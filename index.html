<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pınar Süt Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            theme: {
              primary: '#0D4C54',
              secondary: '#3B7D86',
              accent: '#2DD4BF',
              success: '#029664ff',
              warning: '#F59E0B',
              danger: '#EF4444',
              info: '#38BDF8',
              bg: {
                light: '#F8FAFC',
                dark: '#0F172A'
              },
              card: {
                light: '#FFFFFF',
                dark: '#1E293B'
              },
              text: {
                main: '#1E293B',
                muted: '#64748B',
                dark: {
                  main: '#F8FAFC',
                  muted: '#94A3B8'
                }
              }
            }
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Google Sans", sans-serif;
      transition: background-color 0.2s ease, color 0.2s ease;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(1, 42, 54, 0.15);
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(1, 42, 54, 0.25);
    }

    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
    }

    .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out forwards;
    }

    .card-hover {
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-2px);
    }

    button:focus-visible {
      outline: 2px solid #055b65;
      outline-offset: 2px;
    }

    ::selection {
      background: rgba(27, 212, 136, 0.2);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "plotly.js-dist-min": "https://esm.sh/plotly.js-dist-min@2.35.2"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-theme-bg-light text-theme-text-main selection:bg-theme-accent/20 transition-colors duration-500">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
